main:
    params: [input]
    steps:
    - extract-phl-opa-assessments:
        call: http.post
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/extract_phl_opa_assessments'
            auth:
                type: OIDC
    - load-source-phl-opa-assessments:
        call: http.get
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/run_sql'
            query:
                sql: 'source_opa_assessments.sql'
            auth:
                type: OIDC
    - load-core-phl-opa-assessments:
        call: http.get
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/run_sql'
            query:
                sql: 'core_opa_assessments.sql'
            auth:
                type: OIDC