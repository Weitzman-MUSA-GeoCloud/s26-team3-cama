main:
    params: [input]
    steps:
    - extract-phl-opa-properties:
        call: http.post
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/extract_phl_opa_properties'
            auth:
                type: OIDC
    - load-source-phl-opa-properties:
        call: http.get
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/run_sql'
            query:
                sql: 'source_opa_properties.sql'
            auth:
                type: OIDC
    - load-core-phl-opa-properties:
        call: http.get
        args:
            url: 'https://us-central1-musa5090s26-team3.cloudfunctions.net/run_sql'
            query:
                sql: 'core_opa_properties.sql'
            auth:
                type: OIDC